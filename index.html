<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ministry Checklist Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --black: #0a0908;
    --gold-1: #f3d98a;
    --gold-2: #c9a24b;
    --gold-3: #8a6a2c;
    --cream: #efe6d3;
    --cream-dim: #a9a08c;
    --line: rgba(201,162,75,0.25);
    --card: #141312;
    --danger: #b5654f;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    background:
      radial-gradient(ellipse 900px 500px at 50% -10%, rgba(140,108,45,0.14), transparent 60%),
      linear-gradient(180deg, #0a0908 0%, #060605 100%);
    color: var(--cream);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 36px 20px 80px;
  }

  .wrap{ max-width: 860px; margin: 0 auto; }

  header{ text-align:center; margin-bottom: 22px; }
  .eyebrow{
    font-size: 12px; letter-spacing: 4px; font-weight:600;
    color: var(--gold-1); text-transform: uppercase;
  }

  .title-row{
    display:flex; align-items:center; justify-content:center; gap:10px;
    margin: 10px 0 6px;
  }
  h1{
    font-family:'Playfair Display', serif;
    font-weight: 700;
    font-size: 32px;
    margin: 0;
    background: linear-gradient(180deg, #fbeec2 0%, #c9a24b 70%, #7c5e28 100%);
    -webkit-background-clip: text; background-clip:text; color:transparent;
  }
  #titleInput{
    font-family:'Playfair Display', serif;
    font-weight: 700;
    font-size: 32px;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--gold-2);
    color: var(--gold-1);
    text-align:center;
    outline:none;
    width: 100%;
    max-width: 520px;
  }
  .edit-btn{
    background:none; border:none; cursor:pointer;
    color: var(--gold-3); font-size: 15px; padding: 4px;
    opacity: 0.7;
  }
  .edit-btn:hover{ opacity: 1; color: var(--gold-1); }
  .tag{ color: var(--cream-dim); font-size: 14px; }

  /* Department tabs */
  .tabs{
    display:flex; flex-wrap: wrap; justify-content:center; gap:8px;
    margin: 24px 0 8px;
  }
  .tab{
    position: relative;
    display:flex; align-items:center; gap:8px;
    padding: 9px 16px;
    border-radius: 20px;
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--cream-dim);
    font-size: 13.5px;
    font-weight:600;
    letter-spacing: 0.5px;
    cursor:pointer;
    transition: all .15s ease;
  }
  .tab .pct{ font-size: 11.5px; color: var(--gold-3); font-variant-numeric: tabular-nums;}
  .tab.active{
    background: linear-gradient(180deg, rgba(243,217,138,0.16), rgba(201,162,75,0.06));
    border-color: var(--gold-2);
    color: var(--gold-1);
  }
  .tab.active .pct{ color: var(--gold-1); }
  .tab .tab-x{
    margin-left: 2px; color: var(--cream-dim); opacity:0; font-size:13px;
  }
  .tab:hover .tab-x{ opacity: 0.6; }
  .tab .tab-x:hover{ opacity: 1 !important; color: var(--danger); }

  .tab-add{
    display:flex; align-items:center; gap:8px;
    padding: 9px 14px;
    border-radius: 20px;
    border: 1px dashed var(--gold-3);
    background: transparent;
    color: var(--gold-3);
    font-size: 13.5px;
    cursor:pointer;
  }
  .tab-add:hover{ color: var(--gold-1); border-color: var(--gold-1); }

  .new-dept-row{
    display:none;
    justify-content:center; gap:8px;
    margin: 10px 0 4px;
  }
  .new-dept-row input{
    background: var(--card);
    border: 1px solid var(--gold-3);
    color: var(--cream);
    padding: 8px 12px;
    border-radius: 6px;
    font-family:'Inter',sans-serif;
    font-size: 13.5px;
    outline:none;
    width: 220px;
  }
  .new-dept-row button{
    background: linear-gradient(180deg, var(--gold-1), var(--gold-2));
    border:none; border-radius: 6px;
    padding: 8px 16px;
    font-weight:700; font-size:13px;
    cursor:pointer;
    color: var(--black);
  }

  .overall{
    margin: 22px 0 30px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 18px 22px;
  }
  .overall-top{
    display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px;
  }
  .overall-top .label{ font-size:13px; letter-spacing:2px; color:var(--cream-dim); text-transform:uppercase; font-weight:600;}
  .overall-top .pct{ font-family:'Playfair Display',serif; font-size:22px; color: var(--gold-1); font-weight:700;}
  .bar-track{ width:100%; height:8px; background:#242220; border-radius:4px; overflow:hidden;}
  .bar-fill{ height:100%; background: linear-gradient(90deg, var(--gold-3), var(--gold-1)); border-radius:4px; transition: width .35s ease;}

  .group{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 10px;
    margin-bottom: 18px;
    overflow: hidden;
  }
  .group-head{
    display:flex; justify-content:space-between; align-items:center;
    padding: 16px 20px;
    cursor: pointer;
    user-select:none;
  }
  .group-name{
    font-family:'Playfair Display', serif;
    font-weight:700;
    font-size: 18px;
    color: var(--gold-1);
    letter-spacing: 0.5px;
  }
  .group-meta{ display:flex; align-items:center; gap:14px; }
  .group-count{ font-size:13px; color:var(--cream-dim); font-variant-numeric: tabular-nums;}
  .mini-bar{ width:80px; height:6px; background:#242220; border-radius:3px; overflow:hidden;}
  .mini-fill{ height:100%; background: linear-gradient(90deg, var(--gold-3), var(--gold-1)); }
  .chev{ color: var(--gold-2); font-size:12px; transition: transform .2s ease; }
  .chev.open{ transform: rotate(90deg); }
  .group-del{
    background:none; border:none; color: var(--cream-dim); cursor:pointer; font-size:15px;
    padding: 2px 4px; opacity: 0.55;
  }
  .group-del:hover{ color: var(--danger); opacity:1; }

  .items{ border-top: 1px solid var(--line); }
  .item{
    display:flex; align-items:flex-start; gap:12px;
    padding: 12px 20px;
    border-bottom: 1px solid rgba(201,162,75,0.1);
  }
  .checkbox{
    flex: none;
    width: 20px; height:20px;
    border-radius: 4px;
    border: 1.5px solid var(--gold-2);
    margin-top: 2px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    background: transparent;
    transition: background .15s ease, border-color .15s ease;
  }
  .checkbox.checked{
    background: linear-gradient(180deg, var(--gold-1), var(--gold-2));
    border-color: var(--gold-1);
  }
  .checkbox svg{ width:13px; height:13px; opacity:0; }
  .checkbox.checked svg{ opacity:1; }
  .item-text{
    font-size: 15px;
    line-height: 1.4;
    color: var(--cream);
    cursor: pointer;
    flex: 1;
  }
  .item.done .item-text{
    color: var(--cream-dim);
    text-decoration: line-through;
    text-decoration-color: var(--gold-3);
  }
  .item-del{
    background:none; border:none; color: var(--cream-dim); cursor:pointer;
    font-size: 15px; opacity: 0.4; padding: 0 2px; flex:none;
  }
  .item-del:hover{ color: var(--danger); opacity:1; }

  .add-task-row{
    display:flex; gap:8px; padding: 12px 20px;
  }
  .add-task-row input{
    flex:1;
    background: #1b1a18;
    border: 1px solid var(--line);
    border-radius: 6px;
    color: var(--cream);
    padding: 9px 12px;
    font-size: 14px;
    font-family:'Inter',sans-serif;
    outline:none;
  }
  .add-task-row input:focus{ border-color: var(--gold-2); }
  .add-task-row button{
    background: linear-gradient(180deg, var(--gold-1), var(--gold-2));
    border:none; border-radius: 6px;
    padding: 0 16px;
    font-weight:700; font-size: 13px;
    cursor:pointer; color: var(--black);
    white-space: nowrap;
  }

  .add-group-card{
    display:flex; gap:8px;
    margin-bottom: 18px;
  }
  .add-group-card input{
    flex:1;
    background: var(--card);
    border: 1px dashed var(--gold-3);
    border-radius: 10px;
    color: var(--cream);
    padding: 14px 18px;
    font-size: 14.5px;
    font-family:'Inter',sans-serif;
    outline:none;
  }
  .add-group-card input:focus{ border-color: var(--gold-1); border-style: solid; }
  .add-group-card button{
    background: transparent;
    border: 1px solid var(--gold-3);
    border-radius: 10px;
    padding: 0 20px;
    font-weight:700; font-size: 13.5px;
    cursor:pointer; color: var(--gold-1);
    white-space:nowrap;
  }
  .add-group-card button:hover{ border-color: var(--gold-1); background: rgba(243,217,138,0.08);}

  .empty-dept{
    text-align:center; color: var(--cream-dim); font-size: 14px;
    padding: 30px 0 10px;
  }

  .note{
    text-align:center;
    margin-top: 30px;
    font-size: 12.5px;
    color: var(--gold-3);
    letter-spacing: 1px;
  }

  .loading{ text-align:center; color:var(--cream-dim); padding: 40px 0; font-size:14px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Jesus Is Alive Community · Dubai</div>
    <div class="title-row">
      <h1 id="titleDisplay">Ministry Checklist Tracker</h1>
      <input id="titleInput" style="display:none">
      <button class="edit-btn" id="titleEditBtn" title="Rename checklist">&#9998;</button>
    </div>
    <div class="tag">2nd Anniversary — Ministry-wide Task Tracker</div>
  </header>

  <div class="tabs" id="tabs"></div>
  <div class="new-dept-row" id="newDeptRow">
    <input id="newDeptInput" placeholder="New department name…" maxlength="40">
    <button id="newDeptConfirm">Add</button>
  </div>

  <div class="overall">
    <div class="overall-top">
      <span class="label" id="overallLabel">Progress</span>
      <span class="pct" id="overallPct">0%</span>
    </div>
    <div class="bar-track"><div class="bar-fill" id="overallBar" style="width:0%"></div></div>
  </div>

  <div id="groups" class="loading">Loading checklist…</div>

  <div class="note">Tap to check off · Use + to add tasks or teams · Shared live with your team</div>
</div>

<script>
const STORAGE_KEY = 'jia-ministry-checklist-v2';
const OLD_KEY = 'jia-media-checklist-v1';

const DEFAULT_MEDIA_GROUPS = [
  { name: 'Unassigned', items: [
    { t: 'August postings material (Weekly)', d: false },
    { t: 'August postings material (Daily) — Countdown', d: false },
    { t: 'Carousel (F.A.Q.)', d: false },
    { t: 'Backdrop photobooth', d: false },
    { t: 'Foreground photobooth?', d: false },
    { t: 'Props photobooth', d: false },
  ]},
  { name: 'Ptr. Dan', items: [
    { t: 'July Posting (Portrait)', d: true },
    { t: 'July Posting (Landscape)', d: true },
    { t: "What's next? 2nd day", d: false },
    { t: 'Video Testimonies — Aug 1st Sunday', d: false },
    { t: 'Video Greetings — Aug 2nd Sunday', d: false },
  ]},
  { name: 'Bro. Peter', items: [
    { t: 'July Posting (Portrait)', d: false },
    { t: 'July Posting (Landscape)', d: false },
    { t: 'Poster (Landscape)', d: false },
    { t: 'Poster (Portrait)', d: false },
    { t: 'Banner', d: false },
  ]},
  { name: 'Sis. Eve', items: [
    { t: 'July Posting (Portrait)', d: true },
    { t: 'July Posting (Landscape)', d: true },
    { t: 'Invitation (Portrait)', d: true },
    { t: 'Invitation (Landscape)', d: false },
    { t: 'ID', d: false },
    { t: 'Profile Picture', d: false },
    { t: 'Cover Photo', d: false },
  ]},
  { name: 'Sis. Elle', items: [
    { t: 'July Posting (Portrait)', d: true },
    { t: 'July Posting (Landscape)', d: true },
    { t: 'Stage Design', d: false },
    { t: 'Highlights', d: false },
    { t: 'Profile Picture', d: true },
    { t: 'Cover Photo', d: true },
  ]},
  { name: 'Sis. Cha', items: [
    { t: 'July Posting (Portrait)', d: true },
    { t: 'July Posting (Landscape)', d: true },
    { t: 'What Keeps You Going?', d: false },
    { t: 'Profile Picture', d: false },
    { t: 'Cover Photo', d: false },
  ]},
  { name: 'Sis. Kamisha', items: [
    { t: 'July Posting (Portrait)', d: true },
    { t: 'July Posting (Landscape)', d: false },
    { t: 'Profile Picture', d: false },
    { t: 'Cover Photo', d: false },
  ]},
];

function defaultData(){
  return {
    title: 'Ministry Checklist Tracker',
    departments: [
      { name: 'Media', groups: DEFAULT_MEDIA_GROUPS },
      { name: 'Admin', groups: [
        { name: 'Unassigned', items: [] }
      ]},
      { name: 'CMA', groups: [
        { name: 'Unassigned', items: [] }
      ]},
    ]
  };
}

let data = null;
let activeDept = 0;
const openState = {}; // key `${deptIdx}-${groupIdx}` -> bool

function checkSvg(){
  return '<svg viewBox="0 0 24 24" fill="none" stroke="#0a0908" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
}

function computeCounts(items){
  const done = items.filter(i => i.d).length;
  return { done, total: items.length, pct: items.length ? Math.round(done/items.length*100) : 0 };
}

function deptCounts(dept){
  let done = 0, total = 0;
  dept.groups.forEach(g => { done += g.items.filter(i=>i.d).length; total += g.items.length; });
  return { done, total, pct: total ? Math.round(done/total*100) : 0 };
}

function renderTabs(){
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = '';
  data.departments.forEach((dept, di) => {
    const { pct } = deptCounts(dept);
    const el = document.createElement('div');
    el.className = 'tab' + (di === activeDept ? ' active' : '');
    el.innerHTML = `<span>${dept.name}</span><span class="pct">${pct}%</span><span class="tab-x" data-di="${di}">&#10005;</span>`;
    el.addEventListener('click', (e) => {
      if(e.target.classList.contains('tab-x')) return;
      activeDept = di;
      render();
    });
    el.querySelector('.tab-x').addEventListener('click', (e) => {
      e.stopPropagation();
      if(data.departments.length <= 1) return;
      if(!confirm(`Remove the "${dept.name}" department and all its tasks?`)) return;
      data.departments.splice(di, 1);
      if(activeDept >= data.departments.length) activeDept = data.departments.length - 1;
      render(); save();
    });
    tabs.appendChild(el);
  });

  const addBtn = document.createElement('div');
  addBtn.className = 'tab-add';
  addBtn.innerHTML = '+ Department';
  addBtn.addEventListener('click', () => {
    const row = document.getElementById('newDeptRow');
    row.style.display = row.style.display === 'flex' ? 'none' : 'flex';
    document.getElementById('newDeptInput').focus();
  });
  tabs.appendChild(addBtn);
}

function renderGroups(){
  const dept = data.departments[activeDept];
  const container = document.getElementById('groups');
  container.className = '';
  container.innerHTML = '';

  const { done, total, pct } = deptCounts(dept);
  document.getElementById('overallLabel').textContent = dept.name + ' Progress';
  document.getElementById('overallPct').textContent = pct + '%';
  document.getElementById('overallBar').style.width = pct + '%';

  if(dept.groups.length === 0){
    const empty = document.createElement('div');
    empty.className = 'empty-dept';
    empty.textContent = 'No teams yet in ' + dept.name + '. Add one below.';
    container.appendChild(empty);
  }

  dept.groups.forEach((group, gi) => {
    const key = activeDept + '-' + gi;
    const isOpen = openState[key] !== false;
    const c = computeCounts(group.items);

    const groupEl = document.createElement('div');
    groupEl.className = 'group';
    groupEl.innerHTML = `
      <div class="group-head" data-gi="${gi}">
        <div class="group-name">${group.name}</div>
        <div class="group-meta">
          <span class="group-count">${c.done}/${c.total}</span>
          <div class="mini-bar"><div class="mini-fill" style="width:${c.pct}%"></div></div>
          <span class="chev ${isOpen ? 'open' : ''}">&#9656;</span>
          <button class="group-del" data-gi="${gi}" title="Remove team">&#128465;</button>
        </div>
      </div>
      <div class="items" style="display:${isOpen ? 'block' : 'none'}">
        ${group.items.map((item, ii) => `
          <div class="item ${item.d ? 'done' : ''}" data-gi="${gi}" data-ii="${ii}">
            <div class="checkbox ${item.d ? 'checked' : ''}" data-role="check">${checkSvg()}</div>
            <div class="item-text" data-role="text">${item.t}</div>
            <button class="item-del" data-role="del" title="Remove task">&#10005;</button>
          </div>
        `).join('')}
        <div class="add-task-row">
          <input type="text" placeholder="Add a task…" data-gi="${gi}" maxlength="120">
          <button data-gi="${gi}" data-role="addtask">+ Add</button>
        </div>
      </div>
    `;
    container.appendChild(groupEl);
  });

  // add-group card
  const addGroupCard = document.createElement('div');
  addGroupCard.className = 'add-group-card';
  addGroupCard.innerHTML = `
    <input type="text" id="newGroupInput" placeholder="Add a team or person (e.g. Sis. Mary)…" maxlength="60">
    <button id="newGroupConfirm">+ Add Team</button>
  `;
  container.appendChild(addGroupCard);

  // --- listeners ---
  container.querySelectorAll('.group-head').forEach(el => {
    el.addEventListener('click', (e) => {
      if(e.target.closest('.group-del')) return;
      const gi = el.dataset.gi;
      const key = activeDept + '-' + gi;
      openState[key] = !(openState[key] !== false);
      renderGroups();
    });
  });

  container.querySelectorAll('.group-del').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const gi = +btn.dataset.gi;
      const dept = data.departments[activeDept];
      if(!confirm(`Remove "${dept.groups[gi].name}" and all its tasks?`)) return;
      dept.groups.splice(gi, 1);
      renderTabs(); renderGroups(); save();
    });
  });

  container.querySelectorAll('[data-role="check"]').forEach(el => {
    el.addEventListener('click', () => {
      const item = el.closest('.item');
      const gi = +item.dataset.gi, ii = +item.dataset.ii;
      dept.groups[gi].items[ii].d = !dept.groups[gi].items[ii].d;
      renderTabs(); renderGroups(); save();
    });
  });
  container.querySelectorAll('[data-role="text"]').forEach(el => {
    el.addEventListener('click', () => {
      const item = el.closest('.item');
      const gi = +item.dataset.gi, ii = +item.dataset.ii;
      dept.groups[gi].items[ii].d = !dept.groups[gi].items[ii].d;
      renderTabs(); renderGroups(); save();
    });
  });
  container.querySelectorAll('[data-role="del"]').forEach(el => {
    el.addEventListener('click', () => {
      const item = el.closest('.item');
      const gi = +item.dataset.gi, ii = +item.dataset.ii;
      dept.groups[gi].items.splice(ii, 1);
      renderTabs(); renderGroups(); save();
    });
  });

  container.querySelectorAll('[data-role="addtask"]').forEach(btn => {
    btn.addEventListener('click', () => addTask(btn.dataset.gi));
  });
  container.querySelectorAll('.add-task-row input').forEach(inp => {
    inp.addEventListener('keydown', (e) => {
      if(e.key === 'Enter') addTask(inp.dataset.gi);
    });
  });

  function addTask(gi){
    gi = +gi;
    const input = container.querySelector(`.add-task-row input[data-gi="${gi}"]`);
    const val = input.value.trim();
    if(!val) return;
    dept.groups[gi].items.push({ t: val, d: false });
    input.value = '';
    renderTabs(); renderGroups(); save();
  }

  document.getElementById('newGroupConfirm').addEventListener('click', addGroup);
  document.getElementById('newGroupInput').addEventListener('keydown', (e) => {
    if(e.key === 'Enter') addGroup();
  });
  function addGroup(){
    const input = document.getElementById('newGroupInput');
    const val = input.value.trim();
    if(!val) return;
    dept.groups.push({ name: val, items: [] });
    input.value = '';
    renderTabs(); renderGroups(); save();
  }
}

function render(){
  renderTabs();
  renderGroups();
}

// --- title editing ---
function setupTitleEditing(){
  const display = document.getElementById('titleDisplay');
  const input = document.getElementById('titleInput');
  const editBtn = document.getElementById('titleEditBtn');

  function enterEdit(){
    input.value = data.title;
    display.style.display = 'none';
    input.style.display = 'inline-block';
    input.focus();
    input.select();
  }
  function commit(){
    const val = input.value.trim();
    if(val) data.title = val;
    display.textContent = data.title;
    display.style.display = 'inline-block';
    input.style.display = 'none';
    save();
  }
  editBtn.addEventListener('click', enterEdit);
  display.addEventListener('click', enterEdit);
  input.addEventListener('keydown', (e) => { if(e.key === 'Enter') commit(); });
  input.addEventListener('blur', commit);
}

// --- new department row ---
document.getElementById('newDeptConfirm').addEventListener('click', addDepartment);
document.getElementById('newDeptInput').addEventListener('keydown', (e) => {
  if(e.key === 'Enter') addDepartment();
});
function addDepartment(){
  const input = document.getElementById('newDeptInput');
  const val = input.value.trim();
  if(!val) return;
  data.departments.push({ name: val, groups: [{ name: 'Unassigned', items: [] }] });
  activeDept = data.departments.length - 1;
  input.value = '';
  document.getElementById('newDeptRow').style.display = 'none';
  render(); save();
}

async function save() {
    try {
        const { error } = await supabase
            .from("checklist")
            .update({
                data: data,
                updated_at: new Date().toISOString()
            })
            .eq("id", 1);

        if (error) {
            console.error(error);
        }

    } catch (err) {
        console.error(err);
    }
}

async function load(){
  let usingStorage = true;
  try{
    const result = await withTimeout(window.storage.get(STORAGE_KEY, true), 5000);
    if(result && result.value){
      data = JSON.parse(result.value);
    }else{
      // attempt migration from old media-only tracker
      let migratedGroups = null;
      try{
        const old = await withTimeout(window.storage.get(OLD_KEY, true), 5000);
        if(old && old.value) migratedGroups = JSON.parse(old.value);
      }catch(e){ /* no old data, that's fine */ }

      data = defaultData();
      if(migratedGroups) data.departments[0].groups = migratedGroups;
      await withTimeout(save(), 5000);
    }
  }catch(e){
    // Storage unavailable, timed out, or viewer isn't signed in — fall back to
    // a local (non-synced) copy so the checklist still loads instead of spinning forever.
    usingStorage = false;
    data = defaultData();
  }
  document.getElementById('titleDisplay').textContent = data.title;
  setupTitleEditing();
  render();
  if(!usingStorage){
    const note = document.querySelector('.note');
    note.innerHTML = '⚠️ Working offline — changes here won\'t sync to your team. Open the published link while signed in to Claude to sync.';
  }
}

load();
</script>
